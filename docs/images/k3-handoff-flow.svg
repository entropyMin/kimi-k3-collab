<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Kimi K3 collaboration handoffs</title>
  <desc id="desc">Codex and K3 work in parallel. K3 streams events to the live panel, then await_k3_result returns K3 Markdown to Codex. Execute mode separately returns a Git commit for review.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#57606a"/>
    </marker>
    <style>
      .title { font: 700 24px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #1f2328; }
      .lane { font: 700 16px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0969da; }
      .heading { font: 700 17px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #1f2328; }
      .copy { font: 14px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #57606a; }
      .code { font: 13px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #1f2328; }
      .box { fill: #ffffff; stroke: #d0d7de; stroke-width: 2; }
      .accent { fill: #ddf4ff; stroke: #54aeff; stroke-width: 2; }
      .edit { fill: #dafbe1; stroke: #4ac26b; stroke-width: 2; }
      .arrow { stroke: #57606a; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="430" rx="18" fill="#f6f8fa"/>
  <text x="40" y="48" class="title">Two explicit handoffs, one collaboration</text>

  <text x="40" y="92" class="lane">RESULT HANDOFF · analyze and execute</text>
  <rect x="40" y="112" width="240" height="118" rx="12" class="box"/>
  <text x="62" y="146" class="heading">1 · Split the work</text>
  <text x="62" y="174" class="copy">Codex and K3 own</text>
  <text x="62" y="196" class="copy">complementary subtasks.</text>

  <path d="M 280 171 H 326" class="arrow"/>
  <rect x="328" y="112" width="240" height="118" rx="12" class="accent"/>
  <text x="350" y="146" class="heading">2 · Stream K3 events</text>
  <text x="350" y="174" class="copy">Original Markdown and tools</text>
  <text x="350" y="196" class="copy">stay visible in the live panel.</text>

  <path d="M 568 171 H 614" class="arrow"/>
  <rect x="616" y="112" width="240" height="118" rx="12" class="accent"/>
  <text x="638" y="146" class="heading">3 · Return the result</text>
  <text x="638" y="175" class="code">await_k3_result</text>
  <text x="638" y="200" class="copy">returns K3 Markdown to Codex.</text>

  <path d="M 856 171 H 902" class="arrow"/>
  <rect x="904" y="112" width="256" height="118" rx="12" class="box"/>
  <text x="926" y="146" class="heading">4 · Reconcile</text>
  <text x="926" y="174" class="copy">Codex compares both views</text>
  <text x="926" y="196" class="copy">and reports one conclusion.</text>

  <text x="40" y="286" class="lane">EDIT HANDOFF · execute only</text>
  <rect x="40" y="306" width="528" height="84" rx="12" class="box"/>
  <text x="62" y="339" class="heading">K3 edits an isolated worktree</text>
  <text x="62" y="365" class="copy">Allowed paths are validated; the source checkout is untouched.</text>

  <path d="M 568 348 H 614" class="arrow"/>
  <rect x="616" y="306" width="544" height="84" rx="12" class="edit"/>
  <text x="638" y="339" class="heading">Codex receives a branch and commit for review</text>
  <text x="638" y="365" class="copy">The plugin never merges or cherry-picks automatically.</text>
</svg>
